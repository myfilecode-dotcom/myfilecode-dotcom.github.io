  .card-desc { font-size: 0.875rem; color: #8b949e; line-height: 1.5; flex: 1; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .price { font-size: 1.2rem; font-weight: 800; color: #e6edf3; }
  .buy-btn { padding: 8px 18px; background: #238636; color: #fff; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.15s; text-decoration: none; display: inline-block; }
  .buy-btn:hover { background: #2ea44f; }
  .buy-btn.soon { background: #21262d; color: #6e7681; cursor: default; pointer-events: none; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 0.72rem; padding: 3px 8px; background: #21262d; color: #8b949e; border-radius: 999px; letter-spacing: 0.02em; }

  .affiliate-banner .arrow { color: #58a6ff; font-weight: 700; }

let currentFilter = 'all';
let searchQuery = '';

const total = products.length;
const under20count = products.filter(p => p.price < 20).length;
const midcount = products.filter(p => p.price >= 20 && p.price < 40).length;
const topcount = products.filter(p => p.price >= 40).length;

// Заголовок: всегда показываем кол-во всех продуктов
document.getElementById('hero-count').innerHTML = `<span>Next.js</span> App Templates`;

// Фильтры
document.getElementById('filters').innerHTML = `
  <button class="filter-btn active" onclick="filter('all',this)">All (${total})</button>
  <button class="filter-btn" onclick="filter('under20',this)">Under $20 (${under20count})</button>
  <button class="filter-btn" onclick="filter('20to39',this)">$20–$39 (${midcount})</button>
  <button class="filter-btn" onclick="filter('40plus',this)">$40+ (${topcount})</button>
`;

function filter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let filtered = products;
  if (currentFilter === 'under20') filtered = products.filter(p => p.price < 20);
  if (currentFilter === '20to39') filtered = products.filter(p => p.price >= 20 && p.price < 40);
  if (currentFilter === '40plus') filtered = products.filter(p => p.price >= 40);

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.tagline.toLowerCase().includes(q) || (p.tags || []).some(t => t.toLowerCase().includes(q)));
  }

  filtered = [...filtered].sort((a, b) => (b.whop ? 1 : 0) - (a.whop ? 1 : 0));

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">No templates match "${searchQuery}". Try another search.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="card">
      <div>
        <div class="card-tag">Next.js · TypeScript</div>
        <div class="card-name">${p.name}</div>
      </div>
      <div class="card-desc">${p.tagline}</div>
      ${p.tags ? `<div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
      <div class="card-footer">
        <div class="price">$${p.price}</div>
        ${p.whop
          ? `<a class="buy-btn" href="${p.whop}" target="_blank" rel="noopener">Buy now</a>`
          : `<span class="buy-btn soon">Coming soon</span>`
        }
      </div>
    </div>
  `).join('');
}

document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  renderGrid();
});

renderGrid();
</script>
