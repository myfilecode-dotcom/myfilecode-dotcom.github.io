let currentFilter = 'all';
let searchQuery = '';

const total = products.length;
const under20count = products.filter(p => p.price < 20).length;
const midcount = products.filter(p => p.price >= 20 && p.price < 40).length;
const topcount = products.filter(p => p.price >= 40).length;

// Заголовок: всегда показываем кол-во всех продуктов
document.getElementById('hero-count').innerHTML = `<span>Next.js</span> App Templates`;

// Фильтры
document.getElementById('filters').innerHTML = `
  <button class="filter-btn active" onclick="filter('all',this)">All (${total})</button>
  <button class="filter-btn" onclick="filter('under20',this)">Under $20 (${under20count})</button>
  <button class="filter-btn" onclick="filter('20to39',this)">$20–$39 (${midcount})</button>
  <button class="filter-btn" onclick="filter('40plus',this)">$40+ (${topcount})</button>
`;

function filter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let filtered = products;
  if (currentFilter === 'under20') filtered = products.filter(p => p.price < 20);
  if (currentFilter === '20to39') filtered = products.filter(p => p.price >= 20 && p.price < 40);
  if (currentFilter === '40plus') filtered = products.filter(p => p.price >= 40);

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.tagline.toLowerCase().includes(q) || (p.tags || []).some(t => t.toLowerCase().includes(q)));
  }

  filtered = [...filtered].sort((a, b) => (b.whop ? 1 : 0) - (a.whop ? 1 : 0));

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">No templates match "${searchQuery}". Try another search.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const m = meta[p.id] || { hero: null, screens: [] };
    const screensCount = m.screens.length;
    const screensLabel = screensCount === 1 ? '1 screen' : `${screensCount} screens`;
    const cover = m.hero
      ? `<div class="card-cover"><img src="/promo/${p.id}/${m.hero}" alt="${p.name} preview" loading="lazy" />${screensCount > 1 ? `<span class="card-screens-pill">${screensLabel}</span>` : ''}</div>`
      : '';
    return `
    <div class="card" onclick="openModal('${p.id}')">
      ${cover}
      <div class="card-body">
        <div>
          <div class="card-tag">Next.js · TypeScript${screensCount === 1 ? ` · 1 screen` : ''}</div>
          <div class="card-name">${p.name}</div>
        </div>
        <div class="card-desc">${p.tagline}</div>
        ${p.tags ? `<div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
        <div class="card-footer">
          <div class="price">$${p.price}</div>
          ${p.whop
            ? `<a class="buy-btn" href="${p.whop}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Buy now</a>`
            : `<span class="buy-btn soon">Coming soon</span>`
          }
        </div>
      </div>
    </div>
  `;
  }).join('');
}

function pageLabel(filename) {
  return filename.replace('.png', '').replace(/-/g, ' ');
}

function openModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const m = meta[id] || { hero: null, screens: [] };
  const screensCount = m.screens.length;
  const pagesHTML = m.screens.map(s => `<span class="modal-page">${pageLabel(s)}</span>`).join('');
  const shotsHTML = m.screens.map(s => `
    <div class="modal-shot">
      <img src="/promo/${id}/${s}" alt="${pageLabel(s)}" loading="lazy" />
      <div class="modal-shot-label">${pageLabel(s)}</div>
    </div>`).join('');
  const tagsHTML = p.tags ? p.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';

  document.getElementById('modal-content').innerHTML = `
    ${m.hero ? `<div class="modal-hero"><img src="/promo/${id}/${m.hero}" alt="${p.name}" /></div>` : ''}
    <div class="modal-body">
      <div class="modal-tag">Next.js · TypeScript · ${screensCount} ${screensCount === 1 ? 'screen' : 'screens'}</div>
      <h2 class="modal-title">${p.name}</h2>
      <p class="modal-tagline">${p.tagline}</p>

      ${p.tags ? `
        <div class="modal-section">
          <div class="modal-section-label">Features</div>
          <div class="tags">${tagsHTML}</div>
        </div>` : ''}

      ${m.screens.length ? `
        <div class="modal-section">
          <div class="modal-section-label">Pages included</div>
          <div class="modal-pages">${pagesHTML}</div>
        </div>` : ''}

      ${m.screens.length ? `
        <div class="modal-section">
          <div class="modal-section-label">Screenshots</div>
          <div class="modal-screens">${shotsHTML}</div>
        </div>` : ''}

      <div class="modal-cta">
        <div class="modal-price">$${p.price}<span style="font-size:0.85rem;font-weight:500;color:#8b949e;"> one-time</span></div>
        <div class="modal-buttons">
          <a class="modal-btn secondary" href="/promo/${id}/" target="_blank" rel="noopener">View promo kit</a>
          ${p.whop
            ? `<a class="modal-btn primary" href="${p.whop}" target="_blank" rel="noopener">Buy now</a>`
            : `<span class="modal-btn soon">Coming soon</span>`
          }
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.classList.add('modal-open');
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.classList.remove('modal-open');
}

document.getElementById('modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'modal-backdrop') closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  renderGrid();
});

renderGrid();
</script>
</body>
</html>
